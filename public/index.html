<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orthodox Daily Services</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles/main.css" />
</head>
<body>

<!-- ═══════════════════════════════════════════ VIEW: MAIN ═══════════════════ -->
<div class="view view-main" id="view-main">

  <header>
    <span class="header-cross">☩</span>
    <span class="header-title">ORTHODOX DAILY SERVICES</span>
    <a href="#" class="header-about">About</a>
  </header>

  <div class="layout">

    <!-- CENTER COLUMN -->
    <main class="center" id="center">
      <div class="center-bar">
        <span class="week-label" id="week-label">LOADING…</span>
        <div class="bar-btns">
          <button class="bar-btn" id="search-btn">SEARCH</button>
          <button class="bar-btn" id="date-btn">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none" style="flex-shrink:0;display:block">
              <rect x="1" y="2" width="10" height="9" rx="1" stroke="currentColor" stroke-width="1.2" fill="none"/>
              <line x1="1" y1="5" x2="11" y2="5" stroke="currentColor" stroke-width="1.2"/>
              <line x1="4" y1="1" x2="4" y2="3.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
              <line x1="8" y1="1" x2="8" y2="3.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
            </svg>
            CHANGE
          </button>
        </div>
      </div>

      <div class="service-list-body">
        <div id="service-list"></div>
      </div>
    </main>

    <!-- RIGHT PANEL -->
    <aside class="panel" id="panel">
      <div class="panel-inner">
        <div class="panel-head">
          <div class="panel-top-row">
            <button class="btn-close" id="btn-close">✕</button>
            <button class="btn-print" id="btn-print">PRINT</button>
          </div>
          <div class="panel-svc" id="p-svc">GREAT VESPERS</div>
          <div class="panel-date-str" id="p-date"></div>

          <button class="panel-detail-toggle" id="p-detail-toggle">
            <span class="pdt-label" id="p-detail-label">DETAILS</span>
            <span class="pdt-icon">
              <svg class="pdt-plus" width="8" height="8" viewBox="0 0 8 8" fill="none">
                <line x1="4" y1="0" x2="4" y2="8" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
                <line x1="0" y1="4" x2="8" y2="4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
              </svg>
              <svg class="pdt-minus" width="8" height="2" viewBox="0 0 8 2" fill="none">
                <line x1="0" y1="1" x2="8" y2="1" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
              </svg>
            </span>
          </button>

          <div class="panel-detail-body" id="p-detail-body">
            <div class="panel-detail-body-inner">
              <div class="p-saints" id="p-saints"></div>
              <div class="pronoun-row">
                PRONOUNS:
                <label><input type="radio" name="pron" value="tt" checked> Thee / Thy</label>
                <label><input type="radio" name="pron" value="yy"> You / Your</label>
              </div>
            </div>
          </div>
        </div>
        <div class="panel-body" id="p-body">
          <div class="panel-loading">Loading…</div>
        </div>
      </div>
    </aside>

  </div>

</div><!-- end .view-main -->

<!-- ══════════════════════════════════════════ VIEW: SEARCH ══════════════════ -->
<div class="view view-search" id="view-search">

  <!-- Desktop back button header -->
  <div class="search-hdr">
    <button class="search-back" id="search-back">
      <svg width="8" height="13" viewBox="0 0 8 13" fill="none">
        <path d="M7 1L1 6.5 7 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      BACK
    </button>
  </div>

  <!-- Scrollable content area -->
  <div class="search-content">

    <!-- Input -->
    <div class="search-input-wrap" id="search-input-wrap">
      <div class="search-input-row">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <circle cx="6.5" cy="6.5" r="5" stroke="currentColor" stroke-width="1.4"/>
          <line x1="10.5" y1="10.5" x2="14.5" y2="14.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
        <input type="text" id="search-input" placeholder="Saint, feast, or season…" autocomplete="off" spellcheck="false" />
        <button class="search-clear" id="search-clear" aria-label="Clear">✕</button>
      </div>
    </div>

    <!-- Hint tags (idle state) -->
    <div class="search-hint-area" id="search-hint">
      <div class="hint-label">SUGGESTIONS</div>
      <div class="hint-tags">
        <button class="hint-tag" data-query="Anthony">Anthony</button>
        <button class="hint-tag" data-query="Nicholas">Nicholas</button>
        <button class="hint-tag" data-query="Theotokos">Theotokos</button>
        <button class="hint-tag" data-query="George">George</button>
        <button class="hint-tag" data-query="John">John</button>
        <button class="hint-tag" data-query="Nativity">Nativity</button>
      </div>
    </div>

    <!-- Spinner -->
    <div class="search-spinner-wrap" id="search-spinner">
      <div class="search-spinner"></div>
    </div>

    <!-- Results -->
    <div class="search-results-area" id="search-results"></div>

  </div><!-- end .search-content -->

  <!-- Mobile close button -->
  <div class="search-close-bottom">
    <button class="search-close-btn" id="search-close-mobile">CLOSE</button>
  </div>

</div><!-- end .view-search -->

<!-- ═══════════════════════════════════════ VIEW: CALENDAR ═══════════════════ -->
<div class="view view-cal" id="view-cal">

  <!-- Desktop back button header -->
  <div class="cal-hdr">
    <button class="cal-back" id="cal-back">
      <svg width="8" height="13" viewBox="0 0 8 13" fill="none">
        <path d="M7 1L1 6.5 7 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      BACK
    </button>
  </div>

  <div class="cal-view-body">

    <div>
      <!-- Month navigator -->
      <div class="cal-month-nav" id="cal-month-nav">
        <div class="cal-month-title" id="cal-month-title">MARCH 2026</div>
        <div class="cal-month-arrows">
          <button class="cal-arrow" id="cal-prev" title="Previous month">
            <svg width="7" height="11" viewBox="0 0 7 11" fill="none">
              <path d="M6 1L1 5.5 6 10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <button class="cal-arrow" id="cal-next" title="Next month">
            <svg width="7" height="11" viewBox="0 0 7 11" fill="none">
              <path d="M1 1l5 4.5L1 10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Full calendar grid -->
      <div class="cal-full-grid-wrap" id="cal-grid-wrap">
        <div class="cal-full-grid" id="cal-grid"></div>
      </div>
    </div>

    <!-- Service list strip -->
    <div class="cal-saint-strip" id="cal-saint-strip">
      <div class="css-eyebrow">AVAILABLE SERVICES</div>
      <div class="css-rows" id="css-rows"></div>
    </div>

    <!-- Mobile close button -->
    <div class="cal-close-bottom">
      <button id="cal-close-mobile">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
          <line x1="1" y1="1" x2="11" y2="11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="11" y1="1" x2="1" y2="11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        CLOSE
      </button>
    </div>

  </div>
</div><!-- end .view-cal -->

<script src="/scripts/renderer.js"></script>
<script src="/scripts/app.js"></script>
</body>
</html>
